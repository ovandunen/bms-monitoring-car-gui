org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# Force JDK 21 for Gradle/AGP (avoids IllegalArgumentException: 25.0.2 with JDK 25).
# Install Temurin 21 and set path via: /usr/libexec/java_home -v 21
# org.gradle.java.home=/Library/Java/JavaVirtualMachines/temurin-21.jdk/Contents/Home

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official
ksp.useKSP2=false

android.builtInKotlin=false
android.newDsl=false
